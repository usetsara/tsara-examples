<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tsara Payment Link List Example</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 980px; margin: 40px auto; padding: 0 16px; }
        label { display: block; margin-top: 12px; font-weight: 600; }
        input, select, button { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }
        button { cursor: pointer; }
        pre { background: #111827; color: #f9fafb; padding: 16px; border-radius: 8px; overflow: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { border: 1px solid #d1d5db; padding: 10px; text-align: left; }
        .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    </style>
</head>

<body>
    <h1>Tsara Payment Link List Example</h1>
    <p>List payment links with <code>GET /v1/payment-links</code>.</p>

    <div class="row">
        <div>
            <label>Public Key</label>
            <input id="public_key" value="pk_live_xxxxx">
        </div>
        <div>
            <label>Status</label>
            <select id="status">
                <option value="">all</option>
                <option value="pending">pending</option>
                <option value="active">active</option>
                <option value="inactive">inactive</option>
                <option value="expired">expired</option>
            </select>
        </div>
        <div>
            <label>Slug</label>
            <input id="slug" value="">
        </div>
        <div>
            <label>Limit</label>
            <input id="limit" type="number" value="10">
        </div>
    </div>

    <button id="listButton">Load Payment Links</button>
    <table id="table" style="display:none;">
        <thead>
            <tr><th>ID</th><th>Title</th><th>Slug</th><th>Status</th><th>URL</th></tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>
    <pre id="output">No request sent yet.</pre>

    <script>
        function renderRows(result) {
            const table = document.getElementById('table');
            const rows = document.getElementById('rows');
            rows.innerHTML = '';
            const items = result && Array.isArray(result.data) ? result.data : [];
            if (!result || result.success !== true || items.length === 0) {
                table.style.display = 'none';
                return;
            }
            table.style.display = 'table';
            rows.innerHTML = items.map(function (item) {
                return '<tr><td>' + (item.id || '-') + '</td><td>' + (item.title || '-') + '</td><td>' + (item.slug || '-') + '</td><td>' + (item.status || '-') + '</td><td>' + (item.url || '-') + '</td></tr>';
            }).join('');
        }

        async function loadPaymentLinks() {
            const button = document.getElementById('listButton');
            const output = document.getElementById('output');
            const query = new URLSearchParams();
            const status = document.getElementById('status').value;
            const slug = document.getElementById('slug').value.trim();
            const limit = document.getElementById('limit').value;
            if (status) query.set('status', status);
            if (slug) query.set('slug', slug);
            query.set('limit', limit);
            query.set('page', '1');

            button.disabled = true;
            output.textContent = 'Loading payment links...';
            renderRows(null);

            try {
                const response = await fetch('https://api.tsara.ng/v1/payment-links?' + query.toString(), {
                    headers: { 'Authorization': 'Bearer ' + document.getElementById('public_key').value }
                });
                const result = await response.json();
                renderRows(result);
                output.textContent = JSON.stringify(result, null, 2);
            } catch (error) {
                output.textContent = JSON.stringify({ success: false, message: String(error) }, null, 2);
            } finally {
                button.disabled = false;
            }
        }

        document.getElementById('listButton').addEventListener('click', loadPaymentLinks);
    </script>
</body>

</html>
