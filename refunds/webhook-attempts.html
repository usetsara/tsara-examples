<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Refund Webhook Attempts</title><style>body{font-family:Arial,sans-serif;max-width:860px;margin:40px auto;padding:0 16px;color:#111827}.card{border:1px solid #d1d5db;border-radius:12px;padding:20px;background:#f9fafb}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}label{display:block;font-weight:700;margin:12px 0 6px}input,textarea,button,pre{width:100%}input,textarea,button{padding:10px 12px;border-radius:8px;border:1px solid #cbd5e1;font:inherit}textarea{min-height:120px}button{background:#1d4ed8;color:#fff;border:none;cursor:pointer;margin-top:14px}pre{background:#0f172a;color:#e2e8f0;padding:16px;border-radius:10px;overflow:auto}</style></head><body><h1>Refund Webhook Attempts</h1><div class="card"><div class="grid"><div><label>Secret Key</label><input id="secretKey" type="text" placeholder="sk_live_xxxxx"></div><div><label>Refund Reference</label><input id="reference" type="text" value="rf_order_001"></div></div><button id="run">List Attempts</button></div><h2>Response</h2><pre id="output">{}</pre><script>document.getElementById('run').addEventListener('click', async function(){const url=new URL('https://api.tsara.ng/v1/webhooks/refund-attempts');if(document.getElementById('reference').value.trim()) url.searchParams.set('reference',document.getElementById('reference').value.trim());const res=await fetch(url.toString(),{headers:{'Authorization':'Bearer '+document.getElementById('secretKey').value.trim()}});const text=await res.text();try{document.getElementById('output').textContent=JSON.stringify(JSON.parse(text),null,2);}catch(e){document.getElementById('output').textContent=text;}});</script></body></html>
