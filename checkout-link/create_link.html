<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Checkout Link</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <div class="container py-4">
        <h2>Create Checkout Link</h2>
        <p class="text-muted">Uses the canonical <code>POST /v1/checkout</code> API route.</p>
        <button class="btn btn-primary" onclick="createCheckoutLink()">Generate Link</button>
        <div id="response" class="mt-3"></div>
    </div>

    <script>
        async function createCheckoutLink() {
            const body = new URLSearchParams({
                public_key: 'pk_live_xxxxx',
                trx_id: 'TEST-1234567893',
                email: 'johndoe@gmail.com',
                name: 'John Doe',
                phone: '08012345678',
                amount: '1000',
                amount_type: 'fiat',
                currency: 'NGN',
                redirect_url: 'https://yourwebsite.com/checkout/return'
            });

            const requestOptions = {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8'
                },
                body
            };

            try {
                const response = await fetch('https://api.tsara.ng/v1/checkout', requestOptions);
                const result = await response.json();
                const data = result.data || {};
                const fiat = (data.account && data.account.fiat) || {};
                const checkoutUrl = data.checkout_url || result.url || null;
                const trxId = data.id || result.trx_id || 'N/A';

                if (result.success && checkoutUrl) {
                    document.getElementById('response').innerHTML = `
                        <div class="alert alert-success">
                            <p><strong>Checkout Link:</strong> <a href="${checkoutUrl}" target="_blank" rel="noopener noreferrer">${checkoutUrl}</a></p>
                            <p><strong>Transaction ID:</strong> ${trxId}</p>
                            <p><strong>Account Details:</strong></p>
                            <ul>
                                <li><strong>Account Number:</strong> ${fiat.account_number || 'N/A'}</li>
                                <li><strong>Account Name:</strong> ${fiat.account_name || 'N/A'}</li>
                                <li><strong>Bank:</strong> ${fiat.bank_name || 'N/A'} ${fiat.bank_code ? `(${fiat.bank_code})` : ''}</li>
                            </ul>
                        </div>
                    `;
                    return;
                }

                document.getElementById('response').innerHTML = `<div class="alert alert-danger">Error: ${result.message || 'Unable to create checkout session.'}</div>`;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('response').innerHTML = '<div class="alert alert-danger">Failed to create checkout link.</div>';
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
