<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tsara Crypto Bill Retry Example</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 880px; margin: 40px auto; padding: 0 16px; }
        label { display: block; margin-top: 12px; font-weight: 600; }
        input, button { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }
        button { cursor: pointer; }
        pre { background: #111827; color: #f9fafb; padding: 16px; border-radius: 8px; overflow: auto; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { border: 1px solid #d1d5db; border-radius: 8px; padding: 16px; margin-top: 16px; background: #f9fafb; }
        .card h2 { margin-top: 0; font-size: 18px; }
        .muted { color: #6b7280; }
        .hint { margin-top: 12px; color: #92400e; background: #fffbeb; border: 1px solid #fde68a; padding: 12px; border-radius: 8px; }
    </style>
</head>

<body>
    <h1>Tsara Crypto Bill Retry Example</h1>
    <p>Retry a manual-resolution crypto bill with <code>POST /v1/bill/crypto/retry</code>.</p>

    <div class="row">
        <div>
            <label>Public Key</label>
            <input id="public_key" value="pk_live_xxxxx">
        </div>
        <div>
            <label>Transaction ID</label>
            <input id="trx_id" value="ts-1234567890">
        </div>
    </div>

    <div class="hint">
        Retry only works when the order is already in <code>manual_resolution</code> and payment is already confirmed.
    </div>

    <button id="retryButton">Retry Crypto Bill</button>

    <div id="summary" class="card" style="display:none;">
        <h2>Retry Summary</h2>
        <div id="summaryContent" class="muted"></div>
    </div>

    <pre id="output">No request sent yet.</pre>

    <script>
        function renderSummary(result) {
            const summary = document.getElementById('summary');
            const content = document.getElementById('summaryContent');
            const data = result && result.data ? result.data : null;

            if (!result || result.success !== true || !data) {
                summary.style.display = 'none';
                content.textContent = '';
                return;
            }

            summary.style.display = 'block';
            content.innerHTML = [
                'Transaction ID: ' + (data.trx_id || '-'),
                'Reference: ' + (data.reference || '-'),
                'Status: ' + (data.status || '-'),
                'Payment Status: ' + (data.payment_status || '-'),
                'Execution Status: ' + (data.bill_execution_status || '-'),
                'Retry Count: ' + (data.retry_count || 0)
            ].join('<br>');
        }

        async function retryCryptoBill() {
            const button = document.getElementById('retryButton');
            const output = document.getElementById('output');

            button.disabled = true;
            output.textContent = 'Retrying crypto bill...';
            renderSummary(null);

            const payload = {
                trx_id: document.getElementById('trx_id').value.trim()
            };

            try {
                const response = await fetch('https://api.tsara.ng/v1/bill/crypto/retry', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + document.getElementById('public_key').value,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                renderSummary(result);
                output.textContent = JSON.stringify(result, null, 2);
            } catch (error) {
                const result = { success: false, message: String(error) };
                output.textContent = JSON.stringify(result, null, 2);
            } finally {
                button.disabled = false;
            }
        }

        document.getElementById('retryButton').addEventListener('click', retryCryptoBill);
    </script>
</body>

</html>
