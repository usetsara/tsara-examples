<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tsara Electricity Bill Example</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 880px; margin: 40px auto; padding: 0 16px; }
        label { display: block; margin-top: 12px; font-weight: 600; }
        input, select, button { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }
        button { cursor: pointer; }
        pre { background: #111827; color: #f9fafb; padding: 16px; border-radius: 8px; overflow: auto; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { border: 1px solid #d1d5db; border-radius: 8px; padding: 16px; margin-top: 16px; background: #f9fafb; }
        .card h2 { margin-top: 0; font-size: 18px; }
        .muted { color: #6b7280; }
    </style>
</head>

<body>
    <h1>Tsara Electricity Bill Example</h1>
    <p>Create a direct electricity bill purchase with <code>POST /v1/bill/electricity</code>.</p>

    <div class="row">
        <div>
            <label>Public Key</label>
            <input id="public_key" value="pk_live_xxxxx">
        </div>
        <div>
            <label>Idempotency Key</label>
            <input id="idempotency_key" value="bill-electricity-order-001">
        </div>
    </div>

    <div class="row">
        <div>
            <label>Provider</label>
            <input id="provider" value="IKEDC">
        </div>
        <div>
            <label>Meter / Customer Number</label>
            <input id="number" value="1234567890">
        </div>
    </div>

    <div class="row">
        <div>
            <label>Vend Type</label>
            <select id="vend_type">
                <option value="PREPAID">PREPAID</option>
                <option value="POSTPAID">POSTPAID</option>
            </select>
        </div>
        <div>
            <label>Amount (NGN)</label>
            <input id="amount" type="number" value="2000">
        </div>
    </div>

    <button id="createButton">Buy Electricity</button>

    <div id="summary" class="card" style="display:none;">
        <h2>Electricity Purchase Summary</h2>
        <div id="summaryContent" class="muted"></div>
    </div>

    <pre id="output">No request sent yet.</pre>

    <script>
        function renderSummary(result) {
            const summary = document.getElementById('summary');
            const content = document.getElementById('summaryContent');
            const data = result && result.data ? result.data : null;
            const receiver = data && data.receiver ? data.receiver : null;

            if (!result || result.success !== true || !data) {
                summary.style.display = 'none';
                content.textContent = '';
                return;
            }

            summary.style.display = 'block';
            content.innerHTML = [
                'Reference: ' + (data.reference || '-'),
                'Status: ' + (data.status || '-'),
                'Provider: ' + (data.provider || '-'),
                'Gross Amount: ' + (data.gross_amount || '-'),
                receiver ? 'Receiver: ' + [receiver.number, receiver.vend_type].filter(Boolean).join(' / ') : 'Receiver: -'
            ].join('<br>');
        }

        async function buyElectricity() {
            const button = document.getElementById('createButton');
            const output = document.getElementById('output');

            button.disabled = true;
            output.textContent = 'Submitting electricity purchase...';
            renderSummary(null);

            const payload = {
                provider: document.getElementById('provider').value,
                number: document.getElementById('number').value,
                vend_type: document.getElementById('vend_type').value,
                amount: Number(document.getElementById('amount').value),
                idempotency_key: document.getElementById('idempotency_key').value
            };

            try {
                const response = await fetch('https://api.tsara.ng/v1/bill/electricity', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + document.getElementById('public_key').value,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                renderSummary(result);
                output.textContent = JSON.stringify(result, null, 2);
            } catch (error) {
                const result = { success: false, message: String(error) };
                renderSummary(result);
                output.textContent = JSON.stringify(result, null, 2);
            } finally {
                button.disabled = false;
            }
        }

        document.getElementById('createButton').addEventListener('click', buyElectricity);
    </script>
</body>

</html>
