<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tsara Crypto Bill Reconcile Example</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 880px; margin: 40px auto; padding: 0 16px; }
        label { display: block; margin-top: 12px; font-weight: 600; }
        input, button { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }
        button { cursor: pointer; }
        pre { background: #111827; color: #f9fafb; padding: 16px; border-radius: 8px; overflow: auto; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { border: 1px solid #d1d5db; border-radius: 8px; padding: 16px; margin-top: 16px; background: #f9fafb; }
        .card h2 { margin-top: 0; font-size: 18px; }
        .muted { color: #6b7280; }
    </style>
</head>

<body>
    <h1>Tsara Crypto Bill Reconcile Example</h1>
    <p>Run support reconciliation with <code>GET /v1/bill/crypto/reconcile</code>.</p>

    <div class="row">
        <div>
            <label>Public Key</label>
            <input id="public_key" value="pk_live_xxxxx">
        </div>
        <div>
            <label>Provider Reference</label>
            <input id="provider_reference" value="provider-guid-here">
        </div>
    </div>

    <div class="row">
        <div>
            <label>Transaction ID (optional)</label>
            <input id="trx_id" value="">
        </div>
        <div>
            <label>Reference (optional)</label>
            <input id="reference" value="">
        </div>
    </div>

    <button id="reconcileButton">Reconcile Crypto Bill</button>

    <div id="summary" class="card" style="display:none;">
        <h2>Reconciliation Summary</h2>
        <div id="summaryContent" class="muted"></div>
    </div>

    <pre id="output">No request sent yet.</pre>

    <script>
        function renderSummary(result) {
            const summary = document.getElementById('summary');
            const content = document.getElementById('summaryContent');
            const data = result && result.data ? result.data : null;
            const billOrder = data && data.bill_order ? data.bill_order : null;
            const provider = data && data.provider ? data.provider : null;

            if (!result || result.success !== true || !data) {
                summary.style.display = 'none';
                content.textContent = '';
                return;
            }

            summary.style.display = 'block';
            content.innerHTML = [
                'Status: ' + ((data.summary && data.summary.status) || '-'),
                'Transaction Reference: ' + ((data.summary && data.summary.reference) || '-'),
                'Provider Reference: ' + ((provider && provider.provider_reference) || '-'),
                'Execution Account: ' + ((provider && provider.execution_account) || '-'),
                'Bill Order Execution Status: ' + ((billOrder && billOrder.bill_execution_status) || '-'),
                'Bill Order Debit Status: ' + ((billOrder && billOrder.business_debit_status) || '-')
            ].join('<br>');
        }

        async function reconcileCryptoBill() {
            const button = document.getElementById('reconcileButton');
            const output = document.getElementById('output');
            const query = new URLSearchParams();
            const providerReference = document.getElementById('provider_reference').value.trim();
            const trxId = document.getElementById('trx_id').value.trim();
            const reference = document.getElementById('reference').value.trim();

            if (providerReference) {
                query.set('provider_reference', providerReference);
            }
            if (trxId) {
                query.set('trx_id', trxId);
            }
            if (reference) {
                query.set('reference', reference);
            }

            button.disabled = true;
            output.textContent = 'Reconciling crypto bill...';
            renderSummary(null);

            try {
                const response = await fetch('https://api.tsara.ng/v1/bill/crypto/reconcile?' + query.toString(), {
                    headers: {
                        'Authorization': 'Bearer ' + document.getElementById('public_key').value
                    }
                });

                const result = await response.json();
                renderSummary(result);
                output.textContent = JSON.stringify(result, null, 2);
            } catch (error) {
                const result = { success: false, message: String(error) };
                output.textContent = JSON.stringify(result, null, 2);
            } finally {
                button.disabled = false;
            }
        }

        document.getElementById('reconcileButton').addEventListener('click', reconcileCryptoBill);
    </script>
</body>

</html>
