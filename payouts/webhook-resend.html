<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resend Payout Webhook</title>
  <style>body{font-family:Arial,sans-serif;max-width:860px;margin:40px auto;padding:0 16px;color:#111827}.card{border:1px solid #d1d5db;border-radius:12px;padding:20px;background:#f9fafb}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}label{display:block;font-weight:700;margin:12px 0 6px}input,button,pre{width:100%}input,button{padding:10px 12px;border-radius:8px;border:1px solid #cbd5e1;font:inherit}button{background:#1d4ed8;color:#fff;border:none;cursor:pointer;margin-top:14px}pre{background:#0f172a;color:#e2e8f0;padding:16px;border-radius:10px;overflow:auto}</style>
</head>
<body>
  <h1>Resend Payout Webhook</h1>
  <div class="card">
    <div class="grid">
      <div><label>Public Key</label><input id="publicKey" type="text" placeholder="pk_live_xxxxx"></div>
      <div><label>Payout Reference</label><input id="reference" type="text" value="payout_001"></div>
      <div><label>Payout UID (optional)</label><input id="uid" type="text" placeholder="pwdg_1234567890"></div>
      <div><label>Item Reference (optional)</label><input id="itemReference" type="text" placeholder="payout_001_item_1"></div>
    </div>
    <button id="run">Resend Payout Webhook</button>
  </div>
  <h2>Response</h2>
  <pre id="output">{}</pre>
  <script>
    document.getElementById('run').addEventListener('click', async function () {
      const payload = {};
      if (document.getElementById('reference').value.trim()) payload.reference = document.getElementById('reference').value.trim();
      if (document.getElementById('uid').value.trim()) payload.uid = document.getElementById('uid').value.trim();
      if (document.getElementById('itemReference').value.trim()) payload.item_reference = document.getElementById('itemReference').value.trim();
      const res = await fetch('https://api.tsara.ng/v1/webhook/payout/resend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + document.getElementById('publicKey').value.trim() },
        body: JSON.stringify(payload)
      });
      const text = await res.text();
      try { document.getElementById('output').textContent = JSON.stringify(JSON.parse(text), null, 2); }
      catch (e) { document.getElementById('output').textContent = text; }
    });
  </script>
</body>
</html>
