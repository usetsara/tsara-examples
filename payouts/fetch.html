<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fetch Payout</title>
  <style>body{font-family:Arial,sans-serif;max-width:760px;margin:40px auto;padding:0 16px;color:#111827}.card{border:1px solid #d1d5db;border-radius:12px;padding:20px;background:#f9fafb}label{display:block;font-weight:700;margin:12px 0 6px}input,select,button{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #cbd5e1;font:inherit}button{background:#14532d;color:#fff;border:none;cursor:pointer;margin-top:14px}pre{background:#0f172a;color:#e2e8f0;padding:16px;border-radius:10px;overflow:auto}</style>
</head>
<body>
  <h1>Fetch Payout</h1>
  <div class="card">
    <label>Public Key</label><input id="publicKey" type="text" placeholder="pk_live_xxxxx">
    <label>Mode</label>
    <select id="mode"><option value="single">Single</option><option value="bulk">Bulk</option></select>
    <label>ID / UID / Reference</label><input id="reference" type="text" value="payout_001">
    <button id="run">Fetch Payout</button>
  </div>
  <h2>Response</h2>
  <pre id="output">{}</pre>
  <script>
    document.getElementById('run').addEventListener('click', async function () {
      const mode = document.getElementById('mode').value;
      const identifier = encodeURIComponent(document.getElementById('reference').value.trim());
      const url = mode === 'bulk' ? 'https://api.tsara.ng/v1/payouts/bulk?reference=' + identifier : 'https://api.tsara.ng/v1/payouts?reference=' + identifier;
      const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + document.getElementById('publicKey').value.trim() } });
      const text = await res.text();
      try { document.getElementById('output').textContent = JSON.stringify(JSON.parse(text), null, 2); } catch (e) { document.getElementById('output').textContent = text; }
    });
  </script>
</body>
</html>
